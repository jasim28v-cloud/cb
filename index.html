<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | PINK IONIC SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --neon: #ff007f; --bg: #0d0005; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        /* خلفية زهرية أيونية متدرجة */
        .pink-void-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #200010 0%, #000 100%);
        }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; padding: 12px; box-sizing: border-box; }

        /* إطار الفيديو المتغير الألوان أيونياً */
        .crystal-frame { 
            width: 100%; height: 100%; border-radius: 45px; overflow: hidden; position: relative; 
            border: 2px solid var(--neon); 
            box-shadow: 0 0 40px -10px var(--neon);
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            background: #000;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* العلامة المائية */
        .watermark {
            position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg);
            font-family: 'Orbitron', sans-serif; font-size: 3.5rem; font-weight: 900;
            color: rgba(255, 0, 127, 0.04); pointer-events: none; white-space: nowrap;
        }

        /* الترويسة الأيونية */
        header { position: fixed; top: 25px; right: 25px; z-index: 500; display: flex; align-items: center; gap: 12px; }
        .brand-box { padding: 8px 20px; border-radius: 15px; border: 1px solid var(--neon); box-shadow: 0 0 15px var(--neon); background: rgba(0,0,0,0.8); }
        .brand-name { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 14px; letter-spacing: 3px; color: #fff; text-shadow: 0 0 10px var(--neon); }
        .ionic-clock { font-family: 'Orbitron', sans-serif; font-size: 13px; color: var(--neon); background: rgba(255,0,127,0.1); padding: 8px 15px; border-radius: 15px; border: 1px solid rgba(255,0,127,0.2); }

        /* الأزرار الجانبية */
        .side-actions { position: absolute; left: 22px; bottom: 130px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .action-btn { 
            width: 56px; height: 56px; border-radius: 20px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 0.3s; 
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,0,127,0.3); color: var(--neon);
        }
        .admin-btn { border-color: #ffaa00 !important; color: #ffaa00 !important; margin-bottom: 5px; }

        /* الهاشتاج */
        .video-meta { position: absolute; bottom: 40px; right: 25px; z-index: 50; }
        .hashtag { font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--neon); background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 50px; border: 1px solid var(--neon); }

        /* شريط التنقل */
        nav { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            width: 88%; max-width: 400px; height: 70px; border-radius: 30px; 
            background: rgba(20,0,10,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,0,127,0.2);
            display: flex; justify-content: space-around; align-items: center; z-index: 200; 
        }

        /* نافذة الدردشة */
        #chat-overlay {
            position: fixed; inset: 0; z-index: 600; background: rgba(10,0,5,0.95);
            display: none; flex-direction: column; padding: 30px;
        }

        .chat-msg { background: rgba(255,0,127,0.05); border: 1px solid rgba(255,0,127,0.1); padding: 12px; border-radius: 18px; margin-bottom: 10px; }

        .admin-panel { position: fixed; inset: 0; z-index: 999; background: #000; display: none; flex-direction: column; padding: 40px 20px; }
    </style>
</head>
<body>

    <div class="pink-void-bg"></div>

    <header>
        <div class="brand-box"><span class="brand-name">VØID_X</span></div>
        <div class="ionic-clock" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <i class="fas fa-th-large text-white/20"></i>
        <div id="upload-trigger" class="w-14 h-14 bg-[#ff007f] text-white rounded-[22px] flex items-center justify-center shadow-[0_0_25px_rgba(255,0,127,0.5)] active:scale-90 transition-transform cursor-pointer">
            <i class="fas fa-plus text-lg"></i>
        </div>
        <i class="fas fa-comment-dots text-[#ff007f] text-xl cursor-pointer" onclick="toggleChat()"></i>
    </nav>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-[#ff007f] tracking-widest">PINK_COMM_CENTER</h2>
            <i class="fas fa-times text-white/50 text-xl p-2" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto pr-2"></div>
        <div class="mt-4 flex gap-3 p-2 bg-white/5 rounded-2xl border border-pink-500/20">
            <input type="text" id="msg-input" class="bg-transparent flex-1 outline-none px-4 py-2" placeholder="أرسل نبضة رقمية...">
            <button onclick="sendMsg()" class="bg-[#ff007f] text-white px-6 rounded-xl font-bold">SEND</button>
        </div>
    </div>

    <div id="admin-overlay" class="admin-panel">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-[Orbitron] text-[#ffaa00]">ROOT_CONSOLE</h2>
            <button onclick="toggleAdmin()" class="bg-white/10 px-8 py-2 rounded-full">CLOSE</button>
        </div>
        <div id="admin-list" class="space-y-4 overflow-y-auto"></div>
    </div>

    <script>
        const ADMIN_PASS = "1234";
        const AD_LINKS = ["https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c", "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"];
        let currentAd = 0;
        const USR_ID = "ION-" + Math.floor(Math.random()*999);

        const firebaseConfig = { databaseURL: "https://goms-8fdfd-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateClock, 1000);

        db.ref('videos').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <div class="crystal-frame">
                        <div class="watermark">PINK IONIC</div>
                        <video loop playsinline src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="video-meta"><span class="hashtag">#VØID_PINK</span></div>
                        <div class="side-actions">
                            <div class="action-btn admin-btn" onclick="checkAdmin()">
                                <i class="fas fa-user-lock"></i>
                                <span class="text-[8px] mt-1">ADMIN</span>
                            </div>
                            <div class="action-btn" onclick="triggerAd(); db.ref('videos/${id}/likes').transaction(l=>(l||0)+1)">
                                <i class="fas fa-bolt"></i>
                                <span class="text-[10px] mt-1 font-black">${vid.likes || 0}</span>
                            </div>
                            <div class="action-btn" onclick="toggleChat()"><i class="fas fa-terminal"></i></div>
                            <div class="action-btn" onclick="triggerAd(); navigator.share({url:window.location.href})"><i class="fas fa-rocket"></i></div>
                        </div>
                    </div>
                `;
                container.appendChild(section);

                adminList.innerHTML += `<div class="flex items-center gap-4 p-4 glass-ui rounded-3xl border border-white/5">
                    <video class="w-14 h-14 rounded-xl object-cover" src="${vid.url}"></video>
                    <div class="flex-1 text-[10px] font-[Orbitron] opacity-40">${id}</div>
                    <i class="fas fa-trash-alt text-red-500 p-2" onclick="if(confirm('حذف نهائي؟')) db.ref('videos/${id}').remove()"></i>
                </div>`;
            });
            initObserver();
        });

        function triggerAd() { window.open(AD_LINKS[currentAd], '_blank'); currentAd = (currentAd + 1) % AD_LINKS.length; }
        function toggleChat() { const c = document.getElementById('chat-overlay'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function checkAdmin() { if(prompt("ACCESS CODE:")===ADMIN_PASS) toggleAdmin(); }
        function toggleAdmin() { const a = document.getElementById('admin-overlay'); a.style.display = a.style.display==='flex'?'none':'flex'; }

        // الدردشة الزهرية
        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()){ db.ref('chat').push({user:USR_ID, text:inp.value}); inp.value=''; }
        }
        db.ref('chat').limitToLast(25).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                box.innerHTML += `<div class="chat-msg"><span class="text-[9px] text-pink-500 font-[Orbitron] block mb-1">${d.user}</span><p class="text-sm">${d.text}</p></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // تحسين الرفع بالواجهة الزهرية
        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dpcysggzh", uploadPreset: "poro_go",
            styles: {
                palette: { window: "#0d0005", sourceBg: "#0d0005", windowBorder: "#ff007f", tabIcon: "#ff007f", inactiveTabIcon: "#550022", menuIcons: "#ff007f", link: "#ff007f", action: "#ff007f", inProgress: "#ff007f", complete: "#20ff88", error: "#ff2222", textDark: "#000000", textLight: "#ffffff" }
            }
        }, (err, res) => {
            if (!err && res.event === "success") db.ref('videos/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();

        function initObserver() {
            const colors = ['#ff007f', '#00f3ff', '#00ffaa', '#ffaa00', '#7000ff'];
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                        const clr = colors[Math.floor(Math.random()*colors.length)];
                        document.documentElement.style.setProperty('--neon', clr);
                    } else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }
        document.addEventListener('touchstart', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
    </script>
</body>
</html>
