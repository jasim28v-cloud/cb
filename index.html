<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VØID_X | INFINITY IONIC V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&family=Syncopate:wght@700&display=swap');
        
        :root { 
            --neon: #ff007f; 
            --bg: #050002; 
            --glass: rgba(255, 255, 255, 0.03);
            --transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* تعديل جوهري: السماح بالفيو بورت بالتمدد */
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: #fff; 
            overflow: hidden; font-family: 'Cairo', sans-serif; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .pink-void-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a000d 0%, #000 100%);
        }
        .pink-void-bg::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(45deg, transparent 45%, var(--neon) 50%, transparent 55%);
            filter: blur(150px); opacity: 0.15; animation: drift 10s infinite alternate;
        }

        @keyframes drift { from { transform: scale(1) rotate(0deg); } to { transform: scale(1.5) rotate(15deg); } }

        /* تعديل محرك التمرير ليدعم إخفاء الشريط */
        .scroll-engine { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
        }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        /* جعل الفيديو يملأ المساحة المتاحة ديناميكياً */
        .video-segment { 
            height: 100vh; 
            height: -webkit-fill-available; 
            width: 100vw; 
            scroll-snap-align: start; 
            position: relative; 
            overflow: hidden; 
        }
        .crystal-frame { width: 100%; height: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.9); transition: var(--transition); }

        .watermark {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg);
            font-family: 'Syncopate', sans-serif; font-size: 5rem; font-weight: 900;
            color: var(--neon); opacity: 0.05; pointer-events: none; white-space: nowrap;
            z-index: 10; text-transform: uppercase;
        }

        /* تعديل الهيدر ليتناسب مع المساحة الآمنة (env safe area) */
        header { 
            position: fixed; 
            top: calc(env(safe-area-inset-top) + 20px); 
            width: 100%; padding: 0 20px; z-index: 500; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .brand-box { 
            padding: 10px 25px; border-radius: 20px; 
            background: rgba(0,0,0,0.4); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            border-left: 4px solid var(--neon);
        }
        .brand-name { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 16px; letter-spacing: 4px; color: #fff; }
        .ionic-clock { 
            font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--neon); 
            background: var(--glass); padding: 10px 20px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); text-shadow: 0 0 10px var(--neon);
        }

        /* تعديل الأزرار الجانبية لتناسب التمرير الذكي */
        .side-actions { 
            position: absolute; left: 20px; 
            bottom: calc(env(safe-area-inset-bottom) + 120px); 
            display: flex; flex-direction: column; gap: 18px; z-index: 100; 
        }
        .action-btn { 
            width: 58px; height: 58px; border-radius: 50%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: var(--transition); 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .action-btn i { font-size: 20px; transition: 0.3s; }
        .action-btn:active { transform: scale(0.85); background: var(--neon); }
        .action-btn.active-neon { color: var(--neon); border-color: var(--neon); box-shadow: 0 0 20px var(--neon); }

        .video-meta { 
            position: absolute; 
            bottom: calc(env(safe-area-inset-bottom) + 110px); 
            right: 25px; z-index: 50; text-align: right; 
        }
        .hashtag { 
            font-family: 'Orbitron', sans-serif; font-size: 12px; color: #fff; 
            background: linear-gradient(90deg, var(--neon), transparent); 
            padding: 6px 20px; border-radius: 5px; font-weight: bold;
        }

        nav { 
            position: fixed; 
            bottom: calc(env(safe-area-inset-bottom) + 25px); 
            left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 450px; height: 75px; border-radius: 25px; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(30px); 
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 200; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            transition: var(--transition);
        }

        #upload-trigger { 
            width: 60px; height: 60px; background: var(--neon); 
            border-radius: 20px; transform: translateY(-20px);
            box-shadow: 0 10px 30px var(--neon); 
            display: flex; align-items: center; justify-content: center;
            border: 4px solid var(--bg);
        }

        #chat-overlay { 
            position: fixed; inset: 0; z-index: 600; 
            background: rgba(5,0,2,0.95); backdrop-filter: blur(20px);
            display: none; flex-direction: column; padding: 30px; 
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .chat-msg {
            background: var(--glass); padding: 15px; border-radius: 20px; 
            margin-bottom: 12px; border-right: 3px solid var(--neon);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .admin-panel { position: fixed; inset: 0; z-index: 999; background: #000; display: none; flex-direction: column; padding: 40px 20px; }
    </style>
</head>
<body>

    <div class="pink-void-bg"></div>

    <header>
        <div class="brand-box">
            <span class="brand-name">VØID_X</span>
        </div>
        <div class="ionic-clock" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack" onscroll="handleSmartScroll()"></main>

    <nav id="main-nav">
        <i class="fas fa-home text-white/40 text-xl hover:text-white transition-colors"></i>
        <div id="upload-trigger" class="active:scale-90 transition-transform cursor-pointer">
            <i class="fas fa-plus text-white text-2xl"></i>
        </div>
        <i id="chat-icon" class="fas fa-comment-dots text-white/40 text-2xl cursor-pointer" onclick="toggleChat()"></i>
    </nav>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="font-[Orbitron] text-2xl font-black tracking-tighter" style="color: var(--neon)">IONIC_PULSE</h2>
                <p class="text-[10px] text-white/40">GLOBAL_ENCRYPTED_CHANNEL</p>
            </div>
            <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center" onclick="toggleChat()">
                <i class="fas fa-times text-white"></i>
            </div>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto pr-2 space-y-2"></div>
        <div class="mt-6 flex gap-3 p-3 bg-white/5 rounded-2xl border border-white/10 backdrop-blur-xl">
            <input type="text" id="msg-input" class="bg-transparent flex-1 outline-none px-4 py-2 text-white placeholder:text-white/20" placeholder="Type a message...">
            <button onclick="sendMsg()" class="w-12 h-12 rounded-xl flex items-center justify-center transition-all" style="background: var(--neon)">
                <i class="fas fa-paper-plane text-white"></i>
            </button>
        </div>
    </div>

    <div id="admin-overlay" class="admin-panel">
        <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
            <h2 class="font-[Orbitron] text-[#ffaa00] text-xl">SYSTEM_ROOT</h2>
            <button onclick="toggleAdmin()" class="bg-red-500/20 text-red-500 px-6 py-2 rounded-full font-bold">EXIT</button>
        </div>
        <div id="admin-list" class="space-y-4 overflow-y-auto"></div>
    </div>

    <script>
        // وظيفة التمرير الذكي لإخفاء شريط العنوان فقط
        function handleSmartScroll() {
            // هذه الخدعة تجعل المتصفح يظن أن الصفحة تتمدد فيخفي شريط العنوان
            if (window.scrollY === 0) {
                window.scrollTo(0, 1);
            }
        }

        // محاولة إخفاء الشريط عند التحميل مباشرة
        window.addEventListener("load", () => {
            setTimeout(() => window.scrollTo(0, 1), 100);
        });

        const ADMIN_PASS = "1234";
        const AD_LINKS = ["https://data527.click/21330bf1d025d41336e6/57154ac610/?placementName=default"];
        let currentAd = 0;
        const USR_ID = "ION-" + Math.floor(Math.random()*999);

        // Firebase Setup
        const firebaseConfig = { databaseURL: "https://goms-8fdfd-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Clock Engine
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + ":" + 
                                                        now.getMinutes().toString().padStart(2, '0') + ":" + 
                                                        now.getSeconds().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);

        // Main Data Stream
        db.ref('videos').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <div class="crystal-frame">
                        <div class="watermark">VØID_X PRO</div>
                        <video loop playsinline src="${vid.url}" onclick="togglePlay(this)"></video>
                        <div class="video-meta">
                            <div class="mb-2 text-white/60 text-[10px] font-[Orbitron]">ID: ${id.substring(1,8)}</div>
                            <span class="hashtag">#INFINIY_IONIC_V2</span>
                        </div>
                        <div class="side-actions">
                            <div class="action-btn" onclick="checkAdmin()" style="border-color: #ffaa00; color: #ffaa00">
                                <i class="fas fa-shield-halved"></i>
                            </div>
                            <div class="action-btn active-neon" onclick="triggerAd(); db.ref('videos/${id}/likes').transaction(l=>(l||0)+1)">
                                <i class="fas fa-heart"></i>
                                <span class="text-[10px] mt-1 font-bold">${vid.likes || 0}</span>
                            </div>
                            <div class="action-btn" onclick="toggleChat()"><i class="fas fa-comment"></i></div>
                            <div class="action-btn" onclick="triggerAd(); shareVideo()"><i class="fas fa-paper-plane"></i></div>
                        </div>
                    </div>
                `;
                container.appendChild(section);

                adminList.innerHTML += `
                    <div class="flex items-center gap-4 p-4 bg-white/5 rounded-2xl border border-white/5">
                        <video class="w-16 h-16 rounded-lg object-cover" src="${vid.url}"></video>
                        <div class="flex-1">
                            <div class="text-[10px] text-white/30 mb-1">NODE_ID: ${id}</div>
                            <div class="text-xs text-green-500">STATUS: ACTIVE</div>
                        </div>
                        <i class="fas fa-trash-alt text-red-500 bg-red-500/10 p-4 rounded-xl" onclick="deleteVideo('${id}')"></i>
                    </div>`;
            });
            initObserver();
        });

        // Helper Functions
        function togglePlay(v) { v.paused ? v.play() : v.pause(); }
        function triggerAd() { window.open(AD_LINKS[0], '_blank'); }
        function toggleChat() { 
            const c = document.getElementById('chat-overlay'); 
            c.style.display = (c.style.display === 'flex' ? 'none' : 'flex'); 
        }
        function checkAdmin() { if(prompt("ENTER MASTER KEY:") === ADMIN_PASS) toggleAdmin(); }
        function toggleAdmin() { 
            const a = document.getElementById('admin-overlay'); 
            a.style.display = (a.style.display === 'flex' ? 'none' : 'flex'); 
        }
        function deleteVideo(id) { if(confirm('SURE TO REMOVE?')) db.ref('videos/' + id).remove(); }
        function shareVideo() { if(navigator.share) navigator.share({title: 'VØID_X', url: window.location.href}); }

        // Messaging Engine
        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()){ 
                db.ref('chat').push({user:USR_ID, text:inp.value, time: Date.now()}); 
                inp.value = ''; 
            }
        }

        db.ref('chat').limitToLast(15).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => {
                const d = m.val();
                const isMe = d.user === USR_ID;
                box.innerHTML += `
                    <div class="chat-msg" style="${isMe ? 'border-right: 3px solid #fff;' : ''}">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-[Orbitron]" style="color: var(--neon)">${d.user}</span>
                        </div>
                        <p class="text-sm text-white/80">${d.text}</p>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        // Cloudinary Widget
        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "dpcysggzh", uploadPreset: "poro_go",
            styles: { palette: { window: "#050002", sourceBg: "#050002", windowBorder: "#ff007f", tabIcon: "#ff007f", textLight: "#ffffff" } }
        }, (err, res) => {
            if (!err && res.event === "success") db.ref('videos/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();

        // Intersection Observer for AutoPlay & Color Magic
        function initObserver() {
            const colors = ['#ff007f', '#00f3ff', '#ffaa00', '#9d00ff', '#00ffaa'];
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                        // Smooth Color Change
                        const newColor = colors[Math.floor(Math.random()*colors.length)];
                        document.documentElement.style.setProperty('--neon', newColor);
                        document.getElementById('main-nav').style.boxShadow = `0 0 30px -10px ${newColor}`;
                    } else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }

        // Unmute on first touch
        document.addEventListener('touchstart', () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false); 
        }, { once: true });
    </script>
</body>
</html>
