<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VØID_X | PINK NEON EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --neon: #ff007f; --bg: #000000; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; padding: 10px; box-sizing: border-box; }

        .crystal-frame { 
            width: 100%; height: 100%; border-radius: 40px; overflow: hidden; position: relative; 
            border: 1px solid rgba(255, 0, 127, 0.2); 
            box-shadow: 0 0 40px -15px var(--neon);
            background: #000;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* العلامة المائية الزهرية */
        .watermark {
            position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%) rotate(-25deg);
            font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900;
            color: rgba(255, 0, 127, 0.05); pointer-events: none; white-space: nowrap;
        }

        header {
            position: fixed; top: 20px; right: 20px; z-index: 500;
            display: flex; align-items: center; gap: 10px;
        }

        .brand-box {
            padding: 6px 18px; border-radius: 12px;
            border: 1px solid var(--neon);
            box-shadow: 0 0 10px var(--neon);
            background: rgba(0,0,0,0.8);
        }

        .brand-name {
            font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 13px;
            letter-spacing: 2px; color: var(--neon); text-shadow: 0 0 5px var(--neon);
        }

        .ionic-clock {
            font-family: 'Orbitron', sans-serif; font-size: 12px; color: var(--neon);
            background: rgba(255, 0, 127, 0.1); padding: 6px 12px; border-radius: 12px;
            border: 1px solid rgba(255, 0, 127, 0.2);
        }

        .side-actions { position: absolute; left: 20px; bottom: 120px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .action-btn { 
            width: 54px; height: 54px; border-radius: 18px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 0.3s; 
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255, 0, 127, 0.3); color: var(--neon);
        }
        
        .admin-btn { border-color: #ffaa00 !important; color: #ffaa00 !important; }

        .video-meta { position: absolute; bottom: 35px; right: 20px; z-index: 50; }
        .hashtag { 
            font-family: 'Orbitron', sans-serif; font-size: 10px; color: var(--neon); 
            background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 50px; 
            border: 1px solid var(--neon);
        }

        /* نافذة الدردشة الزهرية */
        #chat-overlay {
            position: fixed; inset: 0; z-index: 600; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px); display: none; flex-direction: column; padding: 25px;
        }

        .chat-input-area {
            margin-top: auto; display: flex; gap: 10px; background: rgba(255, 0, 127, 0.05);
            padding: 10px; border-radius: 20px; border: 1px solid rgba(255, 0, 127, 0.2);
        }

        nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 380px; height: 65px; border-radius: 25px; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 0, 127, 0.2);
            display: flex; justify-content: space-around; align-items: center; z-index: 200; 
        }

        .admin-panel { position: fixed; inset: 0; z-index: 700; background: #000; display: none; flex-direction: column; padding: 30px; }
    </style>
</head>
<body>

    <header>
        <div class="brand-box"><span class="brand-name">VØID_X</span></div>
        <div class="ionic-clock" id="clock">00:00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <i class="fas fa-home text-white/40"></i>
        <div id="upload-trigger" class="w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center cursor-pointer shadow-[0_0_15px_#fff]">
            <i class="fas fa-plus"></i>
        </div>
        <i class="fas fa-comment-dots text-[var(--neon)] text-xl cursor-pointer" onclick="toggleChatWithAd()"></i>
    </nav>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-6 border-b border-pink-500/20 pb-4">
            <h3 class="font-[Orbitron] text-pink-500 tracking-widest text-sm">PINK_CHAT_V1</h3>
            <i class="fas fa-times text-white/50" onclick="toggleChat()"></i>
        </div>
        <div id="chat-content" class="flex-1 overflow-y-auto space-y-4 text-sm"></div>
        <div class="chat-input-area">
            <input type="text" id="msg-input" class="bg-transparent flex-1 outline-none px-2" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" class="text-pink-500 px-2"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="admin-overlay" class="admin-panel">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-[Orbitron] text-xl text-[#ffaa00]">ADMIN_CONSOLE</h2>
            <button onclick="toggleAdmin()" class="bg-white/10 px-6 py-2 rounded-full">EXIT</button>
        </div>
        <div id="admin-list" class="space-y-4 overflow-y-auto"></div>
    </div>

    <script>
        const ADMIN_PASS = "1234";
        const AD_LINKS = [
            "https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c",
            "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"
        ];
        let currentAd = 0;
        const MY_ID = "USR-" + Math.floor(Math.random()*999);

        const firebaseConfig = { databaseURL: "https://goms-8fdfd-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateClock, 1000);

        db.ref('videos').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            container.innerHTML = ''; adminList.innerHTML = '';
            if(!data) return;
            
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <div class="crystal-frame">
                        <div class="watermark">PINK VØID</div>
                        <video loop playsinline src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="video-meta"><span class="hashtag">#PINK_NEON</span></div>
                        <div class="side-actions">
                            <div class="action-btn admin-btn" onclick="checkAdmin()">
                                <i class="fas fa-shield-halved"></i>
                            </div>
                            <div class="action-btn" onclick="triggerAd(); db.ref('videos/${id}/likes').transaction(l=>(l||0)+1)">
                                <i class="fas fa-heart"></i>
                                <span class="text-[10px] mt-1">${vid.likes || 0}</span>
                            </div>
                            <div class="action-btn" onclick="toggleChatWithAd()">
                                <i class="fas fa-comment"></i>
                            </div>
                            <div class="action-btn" onclick="triggerAd(); navigator.share({url:window.location.href})">
                                <i class="fas fa-share"></i>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(section);

                adminList.innerHTML += `<div class="flex items-center gap-4 p-4 border border-white/10 rounded-2xl">
                    <video class="w-12 h-12 rounded-lg object-cover" src="${vid.url}"></video>
                    <div class="flex-1 text-[10px] opacity-40">${id}</div>
                    <i class="fas fa-trash text-red-500" onclick="if(confirm('حذف؟')) db.ref('videos/${id}').remove()"></i>
                </div>`;
            });
            initObserver();
        });

        function triggerAd() { window.open(AD_LINKS[currentAd], '_blank'); currentAd = (currentAd + 1) % AD_LINKS.length; }
        function toggleChat() { const c = document.getElementById('chat-overlay'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        function toggleChatWithAd() { triggerAd(); toggleChat(); }
        function checkAdmin() { if(prompt("رمز الدخول:")===ADMIN_PASS) toggleAdmin(); }
        function toggleAdmin() { const a = document.getElementById('admin-overlay'); a.style.display = a.style.display==='flex'?'none':'flex'; }

        // نظام الدردشة
        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()) {
                db.ref('chat').push({user:MY_ID, text:inp.value});
                inp.value = '';
            }
        }
        db.ref('chat').limitToLast(20).on('value', s => {
            const cont = document.getElementById('chat-content');
            cont.innerHTML = '';
            s.forEach(m => {
                const msg = m.val();
                cont.innerHTML += `<div class="p-3 rounded-xl bg-pink-500/10 border border-pink-500/20">
                    <span class="text-[8px] text-pink-500 block mb-1">${msg.user}</span>
                    <p>${msg.text}</p>
                </div>`;
            });
            cont.scrollTop = cont.scrollHeight;
        });

        const myWidget = cloudinary.createUploadWidget({ cloudName: "dpcysggzh", uploadPreset: "poro_go" }, (err, res) => {
            if (!err && res.event === "success") db.ref('videos/').push({ url: res.info.secure_url, likes: 0 });
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play().catch(()=>{});
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.8 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }
        document.addEventListener('touchstart', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
    </script>
</body>
</html>
