<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VØID_X | SUPREME IONIC</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;600;800&display=swap');
        
        :root { 
            --neon: #00f3ff; 
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: radial-gradient(circle at center, #111 0%, #000 100%); 
            color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; 
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        /* محرك التمرير السلس */
        .scroll-engine { 
            height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
            scroll-behavior: smooth;
        }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { 
            height: 100vh; width: 100vw; 
            scroll-snap-align: start; 
            position: relative; padding: 10px; box-sizing: border-box; 
        }

        /* الإطار الزجاجي المطور */
        .crystal-frame { 
            width: 100%; height: 100%; border-radius: 35px; overflow: hidden; position: relative; 
            border: 1px solid var(--glass-border); 
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 40px -15px var(--neon);
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        video { width: 100%; height: 100%; object-fit: cover; border-radius: 35px; }

        /* العلامة المائية المختفية */
        .watermark {
            position: absolute; top: 15%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif; font-size: 2.8rem; font-weight: 900;
            color: rgba(255,255,255,0.02); pointer-events: none; white-space: nowrap;
            letter-spacing: 10px;
        }

        .glass-ui { 
            background: rgba(0,0,0,0.45); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid var(--glass-border); 
        }
        
        /* الترويسة الأيونية */
        header {
            position: fixed; top: env(safe-area-inset-top, 20px); left: 20px; right: 20px; 
            z-index: 500; display: flex; justify-content: space-between; align-items: center;
        }

        .brand-box {
            padding: 6px 18px; border-radius: 12px;
            border: 1px solid var(--neon); background: rgba(0,0,0,0.6);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 5px var(--neon); }
            50% { box-shadow: 0 0 15px var(--neon); }
            100% { box-shadow: 0 0 5px var(--neon); }
        }

        .brand-name { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 14px; letter-spacing: 2px; }

        /* الأزرار الجانبية */
        .side-actions { position: absolute; left: 20px; bottom: 120px; display: flex; flex-direction: column; gap: 18px; z-index: 100; }
        .action-btn { 
            width: 52px; height: 52px; border-radius: 50%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            color: #fff; cursor: pointer;
        }
        .action-btn:active { scale: 0.85; }
        .action-btn.active i { color: var(--neon); filter: drop-shadow(0 0 8px var(--neon)); }

        /* القائمة السفلية */
        nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 380px; height: 65px; border-radius: 25px; 
            display: flex; justify-content: space-around; align-items: center; z-index: 200; 
        }

        .nav-icon { opacity: 0.4; transition: 0.3s; font-size: 1.2rem; cursor: pointer; }
        .nav-icon:hover { opacity: 1; color: var(--neon); }

        .upload-btn {
            width: 50px; height: 50px; background: #fff; color: #000; 
            border-radius: 18px; display: flex; items-center justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.4s;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-box">
            <span class="brand-name text-white">VØID_X</span>
        </div>
        <div class="glass-ui px-4 py-2 rounded-xl text-[12px] font-[Orbitron] text-[#00f3ff]" id="clock">00:00</div>
    </header>

    <main class="scroll-engine" id="video-stack">
        </main>

    <nav class="glass-ui">
        <div class="nav-icon"><i class="fas fa-th-large"></i></div>
        <div id="upload-trigger" class="upload-btn">
            <i class="fas fa-plus text-xl"></i>
        </div>
        <div class="nav-icon" onclick="checkAdminAuth()"><i class="fas fa-shield-halved"></i></div>
    </nav>

    <div id="admin-overlay" class="fixed inset-0 z-[999] bg-black/95 hidden flex-col p-6 backdrop-blur-xl">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Orbitron] text-xl text-orange-500 tracking-tighter">CORE_OVERRIDE</h2>
            <button onclick="toggleAdmin()" class="bg-white/5 border border-white/10 px-6 py-2 rounded-full text-[10px]">CLOSE</button>
        </div>
        <div id="admin-list" class="space-y-3 overflow-y-auto pb-20"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, increment, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://goms-8fdfd-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const ADMIN_PASS = "1234";
        const AD_LINKS = ["https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c"];
        
        // الساعة
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);

        // تحميل البيانات
        const videoRef = ref(db, 'videos');
        onValue(videoRef, (snapshot) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snapshot.val();
            
            container.innerHTML = ''; 
            adminList.innerHTML = '';
            
            if(!data) return;

            Object.entries(data).reverse().forEach(([id, vid]) => {
                // الواجهة الرئيسية
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <div class="crystal-frame">
                        <div class="watermark">VØID_X</div>
                        <video loop playsinline src="${vid.url}" onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="absolute bottom-10 right-6 z-50">
                            <span class="bg-black/60 border border-[var(--neon)] px-4 py-1.5 rounded-full text-[10px] font-bold text-[var(--neon)]">#IONIC_UPGRADE</span>
                        </div>
                        <div class="side-actions">
                            <div class="action-btn glass-ui group" onclick="window.likeVideo('${id}')">
                                <i class="fas fa-bolt text-lg transition-all group-active:scale-150"></i>
                                <span class="text-[9px] mt-1 font-bold">${vid.likes || 0}</span>
                            </div>
                            <div class="action-btn glass-ui" onclick="window.triggerAd()">
                                <i class="fas fa-comment-dots text-lg"></i>
                            </div>
                            <div class="action-btn glass-ui" onclick="window.shareVideo()">
                                <i class="fas fa-paper-plane text-lg"></i>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(section);

                // قائمة المسؤول
                const card = document.createElement('div');
                card.className = "flex items-center justify-between p-4 glass-ui rounded-2xl border-white/5";
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <video class="w-12 h-12 rounded-lg object-cover" src="${vid.url}"></video>
                        <span class="text-[9px] font-[Orbitron] opacity-40">${id.substring(0,10)}...</span>
                    </div>
                    <button onclick="window.deleteVid('${id}')" class="text-red-500 p-3"><i class="fas fa-trash-can"></i></button>
                `;
                adminList.appendChild(card);
            });
            
            initObserver();
        });

        // وظائف عالمية
        window.triggerAd = () => { window.open(AD_LINKS[0], '_blank'); };
        window.likeVideo = (id) => { 
            window.triggerAd();
            update(ref(db, `videos/${id}`), { likes: increment(1) });
        };
        window.deleteVid = (id) => { if(confirm("ERASE DATA?")) remove(ref(db, `videos/${id}`)); };
        window.shareVideo = () => { window.triggerAd(); if(navigator.share) navigator.share({title: 'VØID_X', url: location.href}); };
        window.checkAdminAuth = () => { if(prompt("ACCESS CODE:") === ADMIN_PASS) toggleAdmin(); };

        // رفع الفيديوهات
        const myWidget = cloudinary.createUploadWidget({ cloudName: "dpcysggzh", uploadPreset: "poro_go" }, (err, res) => {
            if (!err && res.event === "success") push(ref(db, 'videos/'), { url: res.info.secure_url, timestamp: Date.now(), likes: 0 });
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();

        // مراقب التمرير الذكي
        function initObserver() {
            const colors = ['#00f3ff', '#ff0055', '#00ffaa', '#ffaa00', '#7000ff'];
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                        const randomColor = colors[Math.floor(Math.random() * colors.length)];
                        document.documentElement.style.setProperty('--neon', randomColor);
                    } else {
                        video.pause();
                        video.currentTime = 0;
                    }
                });
            }, { threshold: 0.7 });

            document.querySelectorAll('.video-segment').forEach(seg => observer.observe(seg));
        }

        window.toggleAdmin = () => {
            const overlay = document.getElementById('admin-overlay');
            overlay.classList.toggle('hidden');
            overlay.classList.toggle('flex');
        };

        // تفعيل الصوت بعد أول لمسة
        document.addEventListener('click', () => { 
            document.querySelectorAll('video').forEach(v => v.muted = false);
        }, { once: true });
    </script>
</body>
</html>
